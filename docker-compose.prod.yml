services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: netloop-prod-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netloop-network

  redis:
    image: redis:7-alpine
    container_name: netloop-prod-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netloop-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: netloop-prod-backend:latest
    container_name: netloop-prod-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      NODE_ENV: production
      PORT: 3333
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netloop-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netloop-api.rule=Host(`netloop.atalhodigital.pro`) && PathPrefix(`/api`)"
      - "traefik.http.routers.netloop-api.entrypoints=websecure"
      - "traefik.http.routers.netloop-api.tls=true"
      - "traefik.http.routers.netloop-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.netloop-api.loadbalancer.server.port=3333"
      - "traefik.http.routers.netloop-api.priority=10"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: netloop-prod-admin:latest
    container_name: netloop-prod-admin
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    networks:
      - netloop-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netloop-admin.rule=Host(`netloop.atalhodigital.pro`) && !PathPrefix(`/api`) && !PathPrefix(`/app`)"
      - "traefik.http.routers.netloop-admin.entrypoints=websecure"
      - "traefik.http.routers.netloop-admin.tls=true"
      - "traefik.http.routers.netloop-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.netloop-admin.loadbalancer.server.port=3002"
      - "traefik.http.routers.netloop-admin.priority=1"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: netloop-prod-web:latest
    container_name: netloop-prod-web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    networks:
      - netloop-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netloop-web.rule=Host(`netloop.atalhodigital.pro`) && PathPrefix(`/app`)"
      - "traefik.http.routers.netloop-web.entrypoints=websecure"
      - "traefik.http.routers.netloop-web.tls=true"
      - "traefik.http.routers.netloop-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.netloop-web.loadbalancer.server.port=3005"
      - "traefik.http.routers.netloop-web.priority=5"

volumes:
  postgres_data:
    name: netloop-prod_postgres_data
    labels:
      com.netloop.protect: "true"
      com.netloop.backup: "required"
      com.netloop.description: "Production PostgreSQL data - DO NOT DELETE"
  redis_data:
    name: netloop-prod_redis_data
    labels:
      com.netloop.protect: "true"
      com.netloop.description: "Production Redis data"

networks:
  netloop-network:
    name: netloop-prod-network
    driver: bridge
  traefik-public:
    external: true
